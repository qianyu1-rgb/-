<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极速导航站 · 多功能版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s ease;
        }

        /* 深色模式 */
        body.dark {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 顶部栏 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        h1 {
            color: white;
            font-size: 1.8rem;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.02);
        }

        /* 分类标签 */
        .categories {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .cat-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .cat-btn.active {
            background: white;
            color: #667eea;
        }

        .cat-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        /* 搜索框 */
        .search-box {
            background: white;
            border-radius: 50px;
            padding: 5px 20px;
            margin-bottom: 30px;
            display: flex;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .search-box input {
            flex: 1;
            border: none;
            padding: 14px 0;
            font-size: 1rem;
            outline: none;
        }

        .search-box button {
            background: #667eea;
            border: none;
            color: white;
            padding: 10px 25px;
            border-radius: 40px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .search-box button:hover {
            transform: scale(1.02);
        }

        /* 链接网格 */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .link-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            text-decoration: none;
            color: #333;
            transition: all 0.2s;
            display: block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        body.dark .link-card {
            background: #2d2d44;
            color: #eee;
        }

        .link-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .link-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .link-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .link-url {
            font-size: 0.7rem;
            color: #667eea;
            word-break: break-all;
        }

        .link-cat {
            display: inline-block;
            font-size: 0.7rem;
            background: #f0f0f0;
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 8px;
        }

        body.dark .link-cat {
            background: #444;
            color: #ccc;
        }

        /* 添加表单 */
        .add-form {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
        }

        body.dark .add-form {
            background: #2d2d44;
        }

        .add-form h3 {
            margin-bottom: 15px;
        }

        .form-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .form-row input, .form-row select {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
        }

        body.dark .form-row input,
        body.dark .form-row select {
            background: #444;
            border-color: #555;
            color: white;
        }

        .form-row button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
        }

        .empty-msg {
            text-align: center;
            color: white;
            grid-column: 1/-1;
            padding: 40px;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; }
            .top-bar { flex-direction: column; align-items: stretch; }
            .controls { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <h1>🚀 极速导航站</h1>
            <div class="controls">
                <button class="icon-btn" onclick="toggleDarkMode()">🌙 深色模式</button>
                <button class="icon-btn" onclick="exportLinks()">💾 导出备份</button>
                <button class="icon-btn" onclick="importLinks()">📁 导入备份</button>
            </div>
        </div>

        <!-- 分类筛选 -->
        <div class="categories" id="categories"></div>

        <!-- 快速搜索跳转 -->
        <div class="search-box">
            <input type="text" id="urlInput" placeholder="输入网址或搜索关键词... 如：百度 或 https://" onkeypress="handleKeyPress(event)">
            <button onclick="smartGo()">跳转 ➜</button>
        </div>

        <!-- 链接列表 -->
        <div class="links-grid" id="linksGrid"></div>

        <!-- 添加新链接 -->
        <div class="add-form">
            <h3>➕ 添加新链接</h3>
            <div class="form-row">
                <input type="text" id="newTitle" placeholder="网站名称（如：百度）">
                <input type="text" id="newUrl" placeholder="网址（如：https://www.baidu.com）">
