<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网页导航站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: white;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 40px;
            font-size: 1.1rem;
        }
        .search-box {
            background: white;
            border-radius: 50px;
            padding: 5px 20px;
            margin-bottom: 40px;
            display: flex;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .search-box input {
            flex: 1;
            border: none;
            padding: 15px 0;
            font-size: 1rem;
            outline: none;
        }
        .search-box button {
            background: #667eea;
            border: none;
            color: white;
            padding: 10px 25px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.2s;
        }
        .search-box button:hover {
            transform: scale(1.02);
            background: #5a67d8;
        }
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .link-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            text-decoration: none;
            color: #333;
            transition: transform 0.2s, box-shadow 0.2s;
            display: block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .link-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .link-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .link-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .link-url {
            font-size: 0.8rem;
            color: #667eea;
            word-break: break-all;
        }
        .link-desc {
            font-size: 0.85rem;
            color: #666;
            margin-top: 8px;
        }
        .add-form {
            background: white;
            border-radius: 16px;
            padding: 25px;
            margin-top: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .add-form h3 {
            margin-bottom: 15px;
            color: #333;
        }
        .form-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .form-group input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
        }
        .form-group input:focus {
            border-color: #667eea;
        }
        .form-group button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
        }
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .links-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 网页导航站</h1>
        <p class="subtitle">快速跳转到你想要的网站</p>

        <div class="search-box">
            <input type="text" id="urlInput" placeholder="输入网址，如 https://www.baidu.com" onkeypress="handleKeyPress(event)">
            <button onclick="goToUrl()">跳转 ➜</button>
        </div>

        <div class="links-grid" id="linksGrid"></div>

        <div class="add-form">
            <h3>➕ 添加新链接</h3>
            <div class="form-group">
                <input type="text" id="newTitle" placeholder="网站名称（如：百度）">
                <input type="text" id="newUrl" placeholder="网址（如：https://www.baidu.com）">
                <button onclick="addLink()">添加</button>
            </div>
        </div>
    </div>

    <script>
        // 默认链接列表
        let links = [
            { title: "百度", url: "https://www.baidu.com", icon: "🔍", desc: "搜索引擎" },
            { title: "谷歌", url: "https://www.google.com", icon: "🌐", desc: "全球搜索引擎" },
            { title: "GitHub", url: "https://github.com", icon: "🐙", desc: "开发者平台" },
            { title: "工具下载网页", url: "https://share.feijipan.com/s/fR1DLjoL", icon: "📺", desc: "千羽工具" },
            { title: "小米rom", url: "https://xiaomirom.com/", icon: "ROM", desc: "刷机包下载" },
            { title: "知乎", url: "https://www.zhihu.com", icon: "💡", desc: "知识分享社区" }
        ];

        // 加载保存的链接
        function loadLinks() {
            const saved = localStorage.getItem("navLinks");
            if (saved) {
                links = JSON.parse(saved);
            }
            renderLinks();
        }

        // 保存链接
        function saveLinks() {
            localStorage.setItem("navLinks", JSON.stringify(links));
        }

        // 渲染链接列表
        function renderLinks() {
            const grid = document.getElementById("linksGrid");
            if (links.length === 0) {
                grid.innerHTML = '<div style="text-align:center; color:white; grid-column:1/-1;">暂无链接，请添加 ➕</div>';
                return;
            }
            grid.innerHTML = links.map((link, index) => `
                <a href="${link.url}" class="link-card" target="_blank" rel="noopener noreferrer">
                    <div class="link-icon">${link.icon || "🔗"}</div>
                    <div class="link-title">${escapeHtml(link.title)}</div>
                    <div class="link-url">${escapeHtml(link.url)}</div>
                    ${link.desc ? `<div class="link-desc">${escapeHtml(link.desc)}</div>` : ''}
                </a>
            `).join('');
        }

        // 添加新链接
        function addLink() {
            const title = document.getElementById("newTitle").value.trim();
            let url = document.getElementById("newUrl").value.trim();
            
            if (!title || !url) {
                alert("请填写网站名称和网址");
                return;
            }
            
            if (!url.startsWith("http://") && !url.startsWith("https://")) {
                url = "https://" + url;
            }
            
            links.push(
